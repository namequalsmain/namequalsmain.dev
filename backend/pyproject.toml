[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "SIM"]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # function-call-in-default — FastAPI's Depends() lives in defaults
    "SIM105", # try/except/pass — explicit is fine
    "SIM108", # ternary — not always more readable
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
