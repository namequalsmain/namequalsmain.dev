# Declarative Render config — push to GitHub, hit "New Blueprint" on Render,
# point it at this repo, and Render creates the service from this file.
#
# Secrets are NOT in this file. Set them in the Render dashboard under
# the service's Environment tab (see docs/DEPLOY.md).

services:
  - type: web
    name: portfolio-api
    runtime: docker
    plan: free
    rootDir: backend
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      # ─── Required (set in Render dashboard, NOT here) ──────────────────────
      - key: SECRET_KEY
        sync: false                # marks as secret; you'll paste it in the UI
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL          # postgresql+asyncpg://... from Neon
        sync: false
      - key: CORS_ORIGINS          # https://<your-site>.netlify.app
        sync: false

      # ─── Storage backend (R2) ──────────────────────────────────────────────
      - key: STORAGE_BACKEND
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: portfolio-uploads
      - key: R2_PUBLIC_BASE_URL
        sync: false
