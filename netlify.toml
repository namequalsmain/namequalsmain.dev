# Netlify auto-picks these up when importing the repo.

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page-app fallback so /projects/:slug works on hard-refresh
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
